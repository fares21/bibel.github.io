<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilel Bouaffar | Bilal Voice Over</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
            background: linear-gradient(145deg, #0b1420 0%, #1a2634 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            color: #e8edf2;
        }

        .card {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 50px;
            padding: 0 40px 45px 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.08);
            text-align: center;
            overflow: hidden;
        }

        /* ===== صورة الغلاف الكبيرة (320px) ===== */
        .profile-cover {
            width: 100%;
            height: 320px;
            background: url('https://media.bio.site/sites/d327f9ec-77d8-495b-862a-94dd99296cd3/pjYwsdNr2AJpxL75cqcbbU.png') center/cover no-repeat;
            border-radius: 50px 50px 0 0;
            margin-top: 0;
            margin-bottom: -95px;
            box-shadow: inset 0 -50px 80px rgba(0, 0, 0, 0.7);
            border-bottom: 3px solid rgba(212, 175, 55, 0.25);
            position: relative;
            z-index: 0;
            background-color: #0b1420;
        }

        /* ===== اللوجو ===== */
        .logo-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #b8942a);
            padding: 5px;
            margin: 0 auto 18px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4), 0 10px 30px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
            border: 4px solid #0b1420;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a2634;
            display: block;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(to left, #ffffff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
            margin-top: -5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b8cfe0;
            margin-bottom: 4px;
            letter-spacing: 0.8px;
        }
        .subtitle i { color: #d4af37; margin-left: 8px; }

        .bio-text {
            font-size: 1rem;
            line-height: 2;
            color: #cbd8e3;
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 24px;
            border-radius: 60px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            margin: 16px 0 24px;
            backdrop-filter: blur(4px);
        }
        .bio-text .highlight { color: #d4af37; font-weight: 600; }
        .bio-text .tag {
            display: inline-block;
            background: rgba(212, 175, 55, 0.12);
            padding: 4px 20px;
            border-radius: 40px;
            margin: 4px 6px;
            font-size: 0.9rem;
            border: 1px solid rgba(212, 175, 55, 0.2);
            font-weight: 500;
        }
        .bio-text .tag i { color: #d4af37; margin-left: 6px; }

        .call-to-action-text {
            display: inline-block;
            margin-top: 8px;
            background: #d4af37;
            color: #0b1420;
            padding: 6px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }
        .call-to-action-text:hover { transform: scale(1.05); background: #e0c04a; }
        .call-to-action-text a { color: #0b1420; text-decoration: none; }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 720px;
            margin: 10px auto 28px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            aspect-ratio: 16 / 9;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 8px 0 28px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 34px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #0b1420;
            background: #d4af37;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            box-shadow: 0 5px 0 #8f7522, 0 8px 20px rgba(0, 0, 0, 0.3);
            flex: 1 1 auto;
            min-width: 130px;
            justify-content: center;
        }
        .btn i { font-size: 1.1rem; color: #0b1420; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #8f7522, 0 14px 30px rgba(212, 175, 55, 0.25); background: #e0c04a; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8f7522; }

        .btn-primary {
            background: #1e3b57;
            color: #d4af37;
            box-shadow: 0 5px 0 #0f1f2f, 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        .btn-primary i { color: #d4af37; }
        .btn-primary:hover { background: #2a4f6e; }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.08);
            color: #b0c4d4;
            font-size: 1.6rem;
            transition: 0.25s ease;
            text-decoration: none;
            backdrop-filter: blur(4px);
        }
        .social-link:hover {
            background: #d4af37;
            color: #0b1420;
            transform: scale(1.08) translateY(-4px);
            border-color: #d4af37;
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.2);
        }

        .footer-note {
            margin-top: 32px;
            font-size: 0.8rem;
            color: #7a8fa0;
            border-top: 1px solid rgba(212, 175, 55, 0.06);
            padding-top: 20px;
            letter-spacing: 0.5px;
        }
        .footer-note i { color: #d4af37; margin: 0 4px; }

        /* ===== استجابة للجوال ===== */
        @media (max-width: 540px) {
            .card { padding: 0 16px 30px 16px; border-radius: 36px; }
            .profile-cover { height: 200px; border-radius: 36px 36px 0 0; margin-bottom: -70px; }
            .logo-wrapper { width: 110px; height: 110px; }
            h1 { font-size: 2rem; }
            .btn { padding: 12px 18px; font-size: 0.85rem; min-width: 100px; }
            .bio-text { font-size: 0.88rem; padding: 14px 16px; }
            .social-link { width: 48px; height: 48px; font-size: 1.3rem; }
        }

        @media (max-width: 400px) {
            .card { padding: 0 12px 20px 12px; border-radius: 28px; }
            .profile-cover { height: 150px; border-radius: 28px 28px 0 0; margin-bottom: -55px; }
            .logo-wrapper { width: 85px; height: 85px; }
            h1 { font-size: 1.6rem; }
            .btn { padding: 10px 12px; font-size: 0.78rem; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="card">

            <img src="https://media.bio.site/sites/d327f9ec-77d8-495b-862a-94dd99296cd3/Cb8zmbwaRh8UJgtbBY8cBW.jpg" alt="شعار Bilel Bouaffar" />
        </div>

        <div class="footer-note">
            <i class="fas fa-microphone-alt"></i> تسجيل احترافي — تعليق صوتي — إنتاج إعلانات <i class="fas fa-headphones"></i>

</body>
</html>
