<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أعمالي | أحمد المصري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== إعدادات عامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
            background: linear-gradient(145deg, #0f1a24 0%, #1e2d3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            color: #e8edf2;
        }

        /* ===== البطاقة الرئيسية ===== */
        .card {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(200, 180, 150, 0.12);
            border-radius: 50px;
            padding: 45px 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 180, 150, 0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.005);
        }

        /* ===== الصورة الشخصية ===== */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9b69a, #a89078);
            padding: 3px;
            margin: 0 auto 18px;
            box-shadow: 0 0 40px rgba(200, 180, 150, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0f1a24;
            background: #1e2d3a;
            display: block;
        }

        /* ===== النصوص ===== */
        h1 {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(to left, #f0ebe5, #d4c5b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4d4;
            margin-bottom: 6px;
            letter-spacing: 0.8px;
        }

        .subtitle i {
            color: #c9b69a;
            margin-left: 8px;
        }

        .bio-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #cbd8e3;
            background: rgba(255, 255, 255, 0.025);
            padding: 14px 22px;
            border-radius: 60px;
            border: 1px solid rgba(200, 180, 150, 0.06);
            margin: 16px 0 28px;
            backdrop-filter: blur(4px);
        }

        .bio-text span {
            color: #d4c5b2;
            font-weight: 500;
        }

        /* ===== حاوية الفيديو ===== */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 18px auto 30px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 180, 150, 0.1);
            background: #0a141e;
            aspect-ratio: 16 / 9;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===== أزرار التنقل ===== */
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 10px 0 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #0f1a24;
            background: #d4c5b2;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            box-shadow: 0 5px 0 #8f7e6b, 0 8px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
            flex: 1 1 auto;
            min-width: 120px;
            justify-content: center;
        }

        .btn i {
            font-size: 1.1rem;
            color: #1e2d3a;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 0 #8f7e6b, 0 14px 30px rgba(200, 180, 150, 0.2);
            background: #ded0bf;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8f7e6b;
        }

        /* زر مميز (أزرق رمادي) */
        .btn-secondary {
            background: #2a3f50;
            color: #e8edf2;
            box-shadow: 0 5px 0 #15222e, 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-secondary i {
            color: #d4c5b2;
        }

        .btn-secondary:hover {
            background: #35556b;
            box-shadow: 0 7px 0 #15222e, 0 14px 30px rgba(42, 63, 80, 0.5);
        }

        /* ===== أيقونات التواصل ===== */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(200, 180, 150, 0.08);
            color: #b0c4d4;
            font-size: 1.5rem;
            transition: 0.25s ease;
            text-decoration: none;
            backdrop-filter: blur(4px);
        }

        .social-link:hover {
            background: #d4c5b2;
            color: #0f1a24;
            transform: scale(1.08) translateY(-4px);
            border-color: #d4c5b2;
            box-shadow: 0 8px 30px rgba(200, 180, 150, 0.15);
        }

        /* ===== تذييل ===== */
        .footer-note {
            margin-top: 32px;
            font-size: 0.78rem;
            color: #7a8fa0;
            border-top: 1px solid rgba(200, 180, 150, 0.06);
            padding-top: 20px;
            letter-spacing: 0.5px;
        }

        .footer-note i {
            color: #c9b69a;
            margin: 0 4px;
        }

        /* ===== استجابة للجوال ===== */
        @media (max-width: 540px) {
            .card {
                padding: 28px 16px;
                border-radius: 36px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn {
                padding: 11px 18px;
                font-size: 0.85rem;
                min-width: 100px;
            }
            .bio-text {
                font-size: 0.88rem;
                padding: 12px 14px;
            }
            .video-wrapper {
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- الصورة الشخصية -->
        <div class="avatar">
            <img src="https://ui-avatars.com/api/?name=أحمد+المصري&background=d4c5b2&color=0f1a24&size=120&bold=true"
                 alt="صورة شخصية" />
        </div>

        <!-- الاسم واللقب -->
        <h1>أحمد المصري</h1>
        <p class="subtitle"><i class="fas fa-headphones"></i> منتج صوتي | مصمم تجارب</p>

        <!-- السيرة الذاتية -->
        <div class="bio-text">
            <span>✦</span> أصنع محتوى بصري وصوتي يترك أثرًا <span>✦</span><br />
            خبرة في الإخراج الصوتي وتصميم التجارب الرقمية
        </div>

        <!-- ===== فيديو يوتيوب في المنتصف ===== -->
        <div class="video-wrapper">
            <!-- استبدل الرابط أدناه برابط الفيديو الخاص بك -->
            <iframe 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&rel=0&modestbranding=1" 
                title="فيديو يوتيوب"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- ===== أزرار التنقل ===== -->
        <div class="nav-buttons">
            <a href="#video-section" class="btn btn-secondary">
                <i class="fas fa-play-circle"></i> مشاهدة الفيديو
            </a>
            <a href="#my-works" class="btn">
                <i class="fas fa-briefcase"></i> أعمالي
            </a>
            <a href="#social-section" class="btn btn-secondary">
                <i class="fas fa-paper-plane"></i> تواصل
            </a>
        </div>

        <!-- ===== قسم الأعمال المصغر ===== -->
        <div id="my-works" style="margin: 6px 0 22px; padding: 6px 0;">
            <p style="color: #b0c4d4; font-size: 0.85rem; letter-spacing: 0.8px; margin-bottom: 14px;">
                <i class="fas fa-arrow-down" style="color: #c9b69a;"></i> أبرز المشاريع الصوتية والبصرية
            </p>
            <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                <span style="background: rgba(200,180,150,0.06); border: 1px solid rgba(200,180,150,0.08); padding: 6px 20px; border-radius: 40px; font-size: 0.82rem;">بودكاست أسبوعي</span>
                <span style="background: rgba(200,180,150,0.06); border: 1px solid rgba(200,180,150,0.08); padding: 6px 20px; border-radius: 40px; font-size: 0.82rem;">تعليق صوتي لإعلان</span>
                <span style="background: rgba(200,180,150,0.06); border: 1px solid rgba(200,180,150,0.08); padding: 6px 20px; border-radius: 40px; font-size: 0.82rem;">مونتاج فيديو موسيقي</span>
            </div>
        </div>

        <!-- ===== روابط التواصل الاجتماعي ===== -->
        <div id="social-section" class="social-row">
            <a href="#" class="social-link" title="يوتيوب"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-link" title="سبوتيفاي"><i class="fab fa-spotify"></i></a>
            <a href="#" class="social-link" title="إنستغرام"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link" title="تويتر"><i class="fab fa-x-twitter"></i></a>
            <a href="#" class="social-link" title="لينكد إن"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-link" title="جيثب"><i class="fab fa-github"></i></a>
        </div>

        <!-- تذييل -->
        <div class="footer-note">
            <i class="fas fa-microphone"></i> محتوى صوتي وبصري بجودة احترافية <i class="fas fa-headphones"></i>
        </div>

    </div>

</body>
</html>
